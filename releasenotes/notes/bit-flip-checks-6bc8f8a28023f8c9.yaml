---
features:
  - |
    Added the :mod:`qiskit_addon_utils.noise_management.bit_flip_checks` sub-package for
    *post-selection* via bit-flip checks. Its transpiler passes insert extra measurements that
    flag qubits corrupted by bit flips, so the affected shots can be discarded to clean up
    noisy results. Checks can be placed at the start of a circuit (to catch faulty
    ground-state initialization), at the end (to catch bit flips during execution), or both,
    and can be extended to spectator qubits. The companion
    :class:`~qiskit_addon_utils.noise_management.bit_flip_checks.PostSelector` computes the
    keep/discard mask for a circuit's measured counts.
